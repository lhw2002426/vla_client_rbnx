# SPDX-License-Identifier: MulanPSL-2.0
#
# VLA Client — LLM-callable skill for VLA inference + JOINT-SPACE execution.
#
# Lifecycle: Lazy-activate (first MCP call triggers atlas resolution)
#   on_init      — parse config, validate parameters
#   on_activate  — resolve vla_server endpoint via atlas, start ROS subscriber thread
#   on_deactivate — stop subscriber thread, clear endpoint cache
#
# Architecture: VLA outputs are de-normalized into ABSOLUTE JOINT TARGETS and
# sent DIRECTLY to /arm/joint_states (sensor_msgs/JointState — piper_ctl_rbnx
# subscribes there for joint-space control). MoveIt is bypassed entirely;
# the internal safety filter (hardware joint-limit clip + per-step rate limit)
# replaces MoveIt's collision detection for the closed-loop VLA control rate.
#
# Action / state unit convention (must match dataset builder):
#   - Joints 1..6:  dataset SDK units = 0.001°  (rad = SDK / 57324.840764)
#   - Gripper (j7): dataset SDK units = "2 * µm"
#                   (meters = SDK / 2_000_000;  piper_ctl multiplies meters
#                    by 1e6 then by gripper_val_mutiple=2 before CAN.)
#
manifestVersion: 1

package:
  name: com.robonix.piper_grasp.vla_client
  version: 0.2.0
  vendor: robonix
  description: VLA client skill — LLM-callable entry point for vision-language-action inference and JOINT-SPACE execution.
  license: MulanPSL-2.0

capability_id: openvla_client

build: bash scripts/build.sh
start: bash scripts/start.sh

capabilities:
  - name: robonix/skill/vla/driver
  - name: robonix/skill/vla/execute

config_defaults:
  vla_server_url: "http://localhost:8777"
  use_atlas_discovery: true

  # Topics
  full_image_topic: /camera/color/image_raw
  wrist_image_topic: /wrist_camera/color/image_raw
  joint_states_topic: /arm/joint_states_single   # piper_ctl publishes proprio here
  joint_cmd_topic:    /arm/joint_states          # piper_ctl subscribes here for joint ctl

  image_resize: [256, 256]
  action_hz: 10.0
  timeout_s: 60.0
  joint_state_dim: 7

  # ── Action de-normalization (piper_grasp2cam_v3, binary gripper) ──────
  # Must EXACTLY match piper_grasp_2cam_v3_dataset_builder.ACTION_MIN / MAX
  # AND piper_grasp_2cam_v3_dataset_builder.STATE_MIN / MAX.
  # Order: [joint1..joint6, gripper] — joints in SDK 0.001°.
  # IMPORTANT: gripper dim (idx 6) is BINARY {0, 1} in v3, NOT continuous.
  #   - Dataset normalization: raw 0/1 → [-1,1] becomes -1/+1
  #   - At runtime: binarize state[6] BEFORE normalize_state(),
  #                 expand action[6] AFTER de-normalize (see gripper_* params below)
  action_min: [-28042.0, 80978.0,    -98976.0, -772.51, 49456.09, -29964.0, 0.0]
  action_max: [ 4566.0,  122947.0,   -63015.0,  3498.0, 68869.87,  14980.0, 1.0]
  state_min:  [-28042.0, 80977.0,    -98974.0, -769.48, 49483.08, -29964.0, 0.0]
  state_max:  [ 4566.0,  122944.96,  -63015.0,  3497.48, 68795.28, 14980.0, 1.0]

  # ── Binary gripper ↔ continuous SDK opening (v3 specific) ─────────────
  # Training data binarizes gripper at this threshold (SDK raw units).
  # Used to:
  #   1) binarize state[6] read from piper SDK BEFORE sending to model
  #   2) decide open/close after model's binary output is de-normalized
  gripper_binarize_threshold_sdk: 40000.0   # raw > 40000 → 1 (open)
  # When model commands "open" (action[6] > 0.5 after de-norm), publish this
  # continuous SDK opening to the arm. Tuned to dataset's typical "fully open"
  # value (~84500 SDK raw ≈ 42 mm).
  gripper_open_sdk:  84500.0
  gripper_close_sdk: 0.0
  # Threshold on de-normalized action[6] (which lives in [0, 1] for v3).
  gripper_open_threshold: 0.5

  # ── Hardware joint limits (safety clip — applied AFTER de-normalization) ──
  # piper datasheet limits (mechanical hard stops) in SDK units (0.001°).
  # Joint 1..6 typical piper limits ≈ ±154°, ±50°(j2 lower limited), etc.
  # We use a conservative superset of dataset bounds so dataset values pass
  # through unclipped, while extreme out-of-distribution outputs get caught.
  # Gripper hard limits: [0, 80 mm] = [0, 80000] in 2*µm-style ⇒ [0, 160000];
  #     but the dataset uses raw 2*µm where 88500 ≈ 44.25 mm, so limit at
  #     [0, 160000] = 0–80mm leaves headroom while clamping negatives to 0.
  hw_action_min: [-160000.0, -160000.0, -160000.0, -160000.0, -160000.0, -160000.0,      0.0]
  hw_action_max: [ 160000.0,  160000.0,  160000.0,  160000.0,  160000.0,  160000.0, 160000.0]

  # ── Per-step rate limit (in dataset SDK units) ────────────────────────
  # 5000 SDK units = 5° per step  → at 10 Hz = 50°/s, comfortable for piper.
  # Gripper: in v3 the gripper is binary, but the EXPANDED command (after
  # _expand_binary_gripper) is in continuous SDK units (0 or ~84500), so
  # we keep a generous gripper rate limit so a single open/close command
  # is allowed to take effect within one step.
  max_delta_per_step_sdk: [5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 5000.0, 100000.0]

  enable_safety_filter: true

  # ── JointState publish parameters ─────────────────────────────────────
  # piper_ctl reads velocity[6] as global velocity % (1-100); 0 → default 30.
  joint_velocity_pct: 30.0
  # piper_ctl reads effort[6] as gripper effort; clipped to [0.5, 3].
  gripper_effort: 1.0
